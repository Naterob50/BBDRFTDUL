  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; background: #080B12; }
    /* Prevent horizontal scroll; allow vertical scroll so short screens don't clip */
    body { overflow-x: hidden; overflow-y: auto; }
    /* Prevent iOS Safari font size inflation */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pickDrop { 0% { opacity:0; transform:translateY(-18px) scale(1.18); } 55% { transform:translateY(4px) scale(0.96); } 100% { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes suffixRise { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0% { left:-60%; } 100% { left:130%; } }
    @keyframes cardIn { from { opacity:0; transform:scale(0.93) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes correctPulse { 0% { box-shadow:0 0 0 0 rgba(34,197,94,0.5); } 60% { box-shadow:0 0 0 14px rgba(34,197,94,0); } 100% { box-shadow:0 0 0 0 rgba(34,197,94,0); } }
    @keyframes wrongShake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-5px); } 40% { transform:translateX(5px); } 60% { transform:translateX(-3px); } 80% { transform:translateX(3px); } }
    @keyframes accentBar { from { transform:scaleX(0); } to { transform:scaleX(1); } }
    /* touch-action: manipulation removes 300ms tap delay on mobile without disabling pinch-zoom */
    button { transition: opacity 0.15s ease, transform 0.15s ease; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }

    /* Card classes applied via className */
    .player-card { transition: transform 0.2s cubic-bezier(0.34,1.3,0.64,1), box-shadow 0.2s ease, border-color 0.2s ease; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    /* Only apply hover lift on devices that actually have a hover pointer (desktop) */
    @media (hover: hover) and (pointer: fine) {
      .player-card.idle:hover { transform: translateY(-4px) scale(1.02); }
    }
    .player-card.state-correct { animation: correctPulse 0.55s ease forwards; }
    .player-card.state-wrong { animation: wrongShake 0.45s ease forwards; }
    .card-enter { animation: cardIn 0.32s cubic-bezier(0.22,1,0.36,1) forwards; }
    .pick-num { animation: pickDrop 0.42s cubic-bezier(0.34,1.4,0.64,1) forwards; }
    .pick-suffix { animation: suffixRise 0.35s ease 0.18s both; }
    .shimmer-line { position:absolute; top:0; left:-60%; width:40%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent); transform:skewX(-12deg); animation: shimmer 1.8s ease 0.3s both; pointer-events:none; }
    .accent-bar { transform-origin: left; animation: accentBar 0.3s cubic-bezier(0.22,1,0.36,1) forwards; }

// ─── SEEDED RNG ──────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function dateToSeed(str) { return str.split('-').reduce((a, b) => a * 1000 + parseInt(b), 0); }
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// ─── ERA DEFINITIONS ─────────────────────────────────────────────────────────
const ERAS = {
  ALL:   { label:'All Eras',   years:[1950,2025] },
  S60:   { label:'60s–70s',    years:[1960,1979] },
  S80:   { label:'80s',        years:[1980,1989] },
  S90:   { label:'90s',        years:[1990,1999] },
  S00:   { label:'2000s',      years:[2000,2009] },
  S10:   { label:'2010s',      years:[2010,2019] },
  S20:   { label:'2020s',      years:[2020,2025] },
};

function eraPool(era) {
  const [min, max] = ERAS[era]?.years || [1950,2025];
  return PLAYERS.filter(p => p.year >= min && p.year <= max);
}

// ─── VALID PAIR CHECK ────────────────────────────────────────────────────────
function isValidPair(a, b) {
  if (a.pick === b.pick) return false;
  if (a.pick === 1 && b.pick === 1) return false;
  return true;
}

// ─── DAILY PAIRS ─────────────────────────────────────────────────────────────
function getDailyPairs(dateStr, era='ALL') {
  const rng = mulberry32(dateToSeed(dateStr) + (era === 'ALL' ? 0 : era.charCodeAt(0)));
  const pool = eraPool(era);
  const shuffled = [...pool].sort(() => rng() - 0.5);
  const pairs = [];
  let i = 0;
  while (pairs.length < 5 && i < shuffled.length - 1) {
    const a = shuffled[i], b = shuffled[i+1];
    if (isValidPair(a, b)) { pairs.push([a, b]); i += 2; } else i++;
  }
  return pairs;
}

// ─── ENDLESS PAIR ────────────────────────────────────────────────────────────
function loadEndlessPair(usedIds, era='ALL') {
  const base = eraPool(era);
  const pool = base.filter(p => !usedIds.includes(p.id));
  const src = pool.length >= 2 ? pool : base.length >= 2 ? base : PLAYERS;
  let attempts = 0;
  while (attempts < 50) {
    const s = [...src].sort(() => Math.random() - 0.5);
    if (isValidPair(s[0], s[1])) return [s[0], s[1]];
    attempts++;
  }
  const ones = src.filter(p => p.pick === 1);
  const nonOnes = src.filter(p => p.pick !== 1);
  if (ones.length && nonOnes.length) return [ones[0], nonOnes[0]];
  return [src[0], src[1]];
}

// ─── GLOBAL STATS (Feature 5) ────────────────────────────────────────────────
// Simulate a realistic global correct-rate for each potential matchup
// We derive it from a hash of the two player IDs so it's deterministic & consistent
function getPairDifficulty(playerA, playerB) {
  // Simulate "what % of players got this right"
  // Based on pick difference: very close picks = harder
  const diff = Math.abs(playerA.pick - playerB.pick);
  // Use player IDs as a seed for some variance
  const seed = ((playerA.id * 31 + playerB.id * 17) % 100) / 100;
  // Base correctRate: closer picks = lower rate
  let base;
  if (diff <= 2) base = 0.38 + seed * 0.18;
  else if (diff <= 5) base = 0.48 + seed * 0.2;
  else if (diff <= 10) base = 0.58 + seed * 0.2;
  else if (diff <= 20) base = 0.65 + seed * 0.2;
  else base = 0.72 + seed * 0.18;
  return Math.min(0.95, Math.max(0.25, base));
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const DAILY_KEY        = 'draftDuel_daily';
const LIFETIME_KEY     = 'draftDuel_lifetime';
const DAILY_STREAK_KEY = 'draftDuel_dayStreak';

function loadDailyRecord() {
  try { const r = localStorage.getItem(DAILY_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveDailyRecord(date, results) {
  try { localStorage.setItem(DAILY_KEY, JSON.stringify({ date, results })); } catch {}
}

// Lifetime stats: { totalGames, totalCorrect, endlessBest }
function loadLifetime() {
  try { const r = localStorage.getItem(LIFETIME_KEY); return r ? JSON.parse(r) : { totalGames:0, totalCorrect:0, endlessBest:0 }; } catch { return { totalGames:0, totalCorrect:0, endlessBest:0 }; }
}
function saveLifetime(data) {
  try { localStorage.setItem(LIFETIME_KEY, JSON.stringify(data)); } catch {}
}

// Daily streak: { lastDate, streak }
function loadDayStreak() {
  try { const r = localStorage.getItem(DAILY_STREAK_KEY); return r ? JSON.parse(r) : { lastDate:null, streak:0 }; } catch { return { lastDate:null, streak:0 }; }
}
function saveDayStreak(data) {
  try { localStorage.setItem(DAILY_STREAK_KEY, JSON.stringify(data)); } catch {}
}
function updateDayStreak(todayStr) {
  const s = loadDayStreak();
  const yesterday = (() => { const d = new Date(todayStr); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  const newStreak = s.lastDate === yesterday ? s.streak + 1 : s.lastDate === todayStr ? s.streak : 1;
  saveDayStreak({ lastDate: todayStr, streak: newStreak });
  return newStreak;
}

function buildShareText(date, results, hardPick, mode, timed) {
  const score = results.filter(Boolean).length;
  const total = results.length;
  const emojis = results.map(r => r ? '✅' : '❌').join('');
  const modeTag = mode === 'INFAMY' ? '💀 Infamy' : mode === 'ENDLESS' ? (timed ? '⏱ Timed' : '♾️ Endless') : '📅 Daily';
  let text = `Draft Duel ${modeTag} 🏀 ${date}\n${score}/${total}\n\n${emojis}`;
  if (hardPick) text += `\n\n💀 "${hardPick.context}" — only ${hardPick.pct}% got it`;
  text += `\n\ndraftduel.netlify.app`;
  return text;
}

  const [mode, setMode] = useState(null); // 'DAILY' | 'ENDLESS' | 'INFAMY'
